name: Logrunner Prod Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm test

      - name: Configure SSH
        env:
          LOGRUNNER_SSH_PRIVATE_KEY: ${{ secrets.LOGRUNNER_SSH_PRIVATE_KEY }}
          LOGRUNNER_SSH_KNOWN_HOSTS: ${{ secrets.LOGRUNNER_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$LOGRUNNER_SSH_PRIVATE_KEY" > ~/.ssh/id_logrunner_prod
          chmod 600 ~/.ssh/id_logrunner_prod
          if [ -n "$LOGRUNNER_SSH_KNOWN_HOSTS" ]; then
            printf '%s\n' "$LOGRUNNER_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          fi
          cat >> ~/.ssh/config <<'EOF'
          Host *
            IdentityFile ~/.ssh/id_logrunner_prod
            StrictHostKeyChecking accept-new
          EOF

      - name: Write logrunner env
        env:
          LOGRUNNER_PROD_ENV_B64: ${{ secrets.LOGRUNNER_PROD_ENV_B64 }}
        run: |
          mkdir -p deploy/logrunner-prod
          printf '%s' "$LOGRUNNER_PROD_ENV_B64" | base64 -d > deploy/logrunner-prod/.env.prod

      - name: Deploy
        env:
          LOGRUNNER_SSH_TARGET: ${{ secrets.LOGRUNNER_SSH_TARGET }}
        run: scripts/deploy-logrunner-prod.sh
